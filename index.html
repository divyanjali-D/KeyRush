<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⌨️ Type Speed Test</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpm">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracy">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="time">0s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Characters</div>
                <div class="stat-value" id="characters">0</div>
            </div>
        </div>

        <div class="test-area">
            <div class="display-text" id="displayText"></div>
            <div class="input-section">
                <input 
                    type="text" 
                    id="inputField" 
                    placeholder="Click start to begin typing..."
                >
                <div class="button-group">
                    <button class="btn-start" id="startBtn" onclick="startTest()">Start Test</button>
                    <button class="btn-reset" id="resetBtn" onclick="resetTest()">Reset</button>
                </div>
            </div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
